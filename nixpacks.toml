[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.playwright"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/playwright install chromium",
  "playwright install-deps"
]

[start]
cmd = "/opt/venv/bin/gunicorn shopify:app --bind 0.0.0.0:$PORT"